name: Paper structure

on:
  pull_request:
    paths:
      - "paper/**"
      - "results/**"
      - ".github/workflows/paper.yml"

permissions:
  contents: read

jobs:
  paper-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: test -f paper/main.tex
      - run: test -f paper/references.bib
      - run: test -f paper/tables/primary_results.tex
      - run: test -f paper/figures/README.md
